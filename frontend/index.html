<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Validacion de identidad mediante comparacion facial" />
    <title>Verificación de identidad</title>
    <script>
      (() => {
        const storageKey = 'identity-verification-theme'
        let storedTheme = null
        try {
          storedTheme = localStorage.getItem(storageKey)
        } catch {}
        const systemTheme = matchMedia('(prefers-color-scheme: light)').matches
          ? 'light'
          : 'dark'
        const initialTheme =
          storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : systemTheme
        document.documentElement.dataset.theme = initialTheme
        document.documentElement.style.colorScheme = initialTheme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
